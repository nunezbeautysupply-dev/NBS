<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a237e">
<title>Nunez Beauty Supply</title>
<style>
  html,body{margin:0;height:100%;background:#1a237e;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:white;}
  .box{text-align:center;}
  .spin{width:36px;height:36px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;margin:0 auto 14px;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <div>Cargando NBS...</div>
</div>
<script>
  // Siempre agrega un valor unico (la hora exacta) para forzar que el telefono
  // pida SIEMPRE la version mas nueva de app.html, nunca una copia guardada.
  location.replace('app.html?v=' + Date.now());
</script>
</body>
</html>
