<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a237e">
<title>Nunez Beauty Supply</title>
<style>
  html,body{margin:0;height:100%;background:#1a237e;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:white;}
  .box{text-align:center;}
  .spin{width:36px;height:36px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;margin:0 auto 14px;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <div>Cargando NBS...</div>
</div>
<script>
  // Registra el service worker para poder abrir la app sin internet mas adelante.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(err){
      console.log('No se pudo registrar el service worker:', err);
    });
  }
  // Siempre agrega un valor unico (la hora exacta) para forzar que el telefono
  // pida SIEMPRE la version mas nueva, nunca una copia guardada.
  //
  // CAMBIO IMPORTANTE -17 de julio de 2026-: antes esto redirigia a app.html, que era la app
  // VIEJA sin Firebase. Por eso el icono de la pantalla de inicio abria la app equivocada, y
  // lo que se registraba ahi no subia a la nube y despues se borraba. Costo un dia completo
  // de ventas. La app vieja ya se saco de GitHub; ahora esto lleva SIEMPRE a la de Firebase.
  location.replace('app_prueba_firebase.html?v=' + Date.now());
</script>
</body>
</html>
